<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 消消乐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>AI 消消乐</h1>
      <p class="subtitle">10×10 网格 · 100 步上限 · 随机道具（列消 / 九宫格 / 同形全消）</p>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="panel">
          <h2>本局数据</h2>
          <div class="stat"><span>总分</span><strong id="score">0</strong></div>
          <div class="stat"><span>连锁分（累计）</span><strong id="chain-score">0</strong></div>
          <div class="stat"><span>步数</span><strong id="moves">0/100</strong></div>
          <div class="stat"><span>剩余步数</span><strong id="steps-left">100</strong></div>
        </section>

        <section class="panel">
          <h2>任务进度</h2>
          <p class="hint">目标图形任务分各达 4 即通关；三级合并每累计 3 次才 +1 任务分</p>
          <div id="special-panel" class="special-panel"></div>
        </section>

        <section class="panel">
          <h2>道具规则</h2>
          <p class="hint">
            道具随机出现。列消：清一列；炸弹：清 3×3；同形：清全局同类型。<br />
            道具消除得分=消除格数；单次消除 ≥9 格额外 +1 对应图形任务分。
          </p>
        </section>

        <section class="panel actions">
          <button type="button" id="btn-ai" class="btn btn-primary">AI 出手</button>
          <button type="button" id="btn-new" class="btn btn-secondary">新一局</button>
        </section>

        <p id="status" class="status"></p>
      </aside>

      <div class="board-wrap">
        <div id="grid" class="grid" role="grid" aria-label="游戏棋盘"></div>
      </div>
    </main>

    <section class="log-panel">
      <h2>操作日志</h2>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script type="module" src="render.js"></script>
</body>
</html>
